{% extends 'base.html' %}
{% block content %}
{% load crispy_forms_tags %}
<h3 class ="text-uppercase text-center" style="letter-spacing: 2px;"> Register</h3>
<form method="POST" action="{% url 'register' %}" style="max-width: 500px; margin: 0 auto;">
    {% csrf_token %}
    {{ form | crispy }}
    <button type="submit" class="btn btn-warning">Register</button>
</form>

{% endblock %}
