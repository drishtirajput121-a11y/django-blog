
{% extends 'base.html' %}
{% load static %}

{% block content %}

<style>
    body {
        background: linear-gradient(-45deg, #ffffff, #ffffff);
    }

    #error-box {
        text-align: center;
        color: #000;
        padding: 80px 20px;
    }

    #error-box img {
        width: 250px;
        margin-bottom: 20px;
    }

    #error-box h1 {
        font-size: 60px;
        margin: 10px 0;
    }

    #error-box p {
        font-size: 18px;
        margin: 10px 0;
    }

    .back-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;

    background-color: #fff428;
    color: black;
    text-decoration: none;
    font-size: 18px;
    border-radius: 30px;
    font-weight: bold;
    transition: 0.3s;
}

    .back-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
</style>

<div id="error-box">

    <!-- Prefer local static image -->
    <img src="https://cdn.jsdelivr.net/gh/ahmedhosna95/upload@1731955f/sad404.svg" alt="404 Image">

    <h1>404</h1>
    <p>Oops! The page you are looking for was not found.</p>

    <a href="{% url 'home' %}" class="back-btn">Go to Home</a>

</div>

{% endblock %}
