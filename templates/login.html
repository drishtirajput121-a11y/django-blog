{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<h3 class ="text-uppercase text-center" style="letter-spacing: 2px;">Login</h3>
<form method ="POST" action="{% url 'login' %}" style="max-width: 500px; margin: 0 auto;">
    {% csrf_token %}
    {{ form | crispy }}
    <button type="submit" class="btn btn-warning">Login</button>
{% endblock %}
